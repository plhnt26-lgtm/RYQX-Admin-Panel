<!DOCTYPE html>
<html>
<head>
<title>RYQX Admin Login</title>

<style>
body{
    margin:0;
    background:#081B3A;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:white;
}

.box{
    background:#111827;
    width:320px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px #7c3aed;
}

h1{
    color:#a855f7;
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:0;
}

button{
    width:95%;
    padding:12px;
    background:#7c3aed;
    color:white;
    border:0;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>RYQX</h1>

<h3>ADMIN LOGIN</h3>

<input placeholder="Username">

<input type="password" placeholder="Password">

<button>
LOGIN ADMIN
</button>

</div>

</body>
</html>
